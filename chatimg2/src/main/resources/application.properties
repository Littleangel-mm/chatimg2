spring.application.name=chatimg2

# PostgreSQL (tcpKeepAlive 防止生图等待期间连接被防火墙断开)
spring.datasource.url=jdbc:postgresql://${DB_HOST:47.108.211.186}:${DB_PORT:5432}/${DB_NAME:chatimg2}?tcpKeepAlive=true&connectTimeout=10&socketTimeout=120&ApplicationName=chatimg2
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:000000000}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP — 远程数据库长连接保活
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=15000
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.idle-timeout=60000

# 生成图片本地保存目录（启动时自动创建，使用绝对路径）
app.image.backup-path=./img/

# API config
app.api.key=${API_KEY:${VITE_API_KEY:}}
app.api.url=${API_URL:${VITE_API_BASE_URL:https://www.maitokens.com}}
app.api.model.text2img=${API_MODEL_TEXT2IMG:${VITE_IMAGE_MODEL:gpt-image-2}}
app.api.model.img2img=${API_MODEL_IMG2IMG:${VITE_IMAGE_MODEL:gpt-image-2}}

# 异步生图轮询（gpt-image-2 提交后返回 task_id，需轮询 /v1/tasks/{id}）
app.api.poll.initial-delay-ms=5000
app.api.poll.interval-ms=5000
app.api.poll.max-wait-ms=600000

# HTTP 超时（生图 API 可能耗时数分钟）
app.api.http.connect-timeout-ms=60000
app.api.http.submit-read-timeout-ms=600000
app.api.http.poll-read-timeout-ms=60000

# 灵感画廊爬虫（爬取 img2.ai 的 prompt 库）
app.inspiration.source-url=${INSPIRATION_SOURCE_URL:https://img2.ai/api/photo-prompt-gallery}
app.inspiration.page-size=${INSPIRATION_PAGE_SIZE:30}
app.inspiration.max-pages=${INSPIRATION_MAX_PAGES:100}
# 是否把图片下载到本地 img/inspiration 自托管（false 则前端直接用远程 URL）
app.inspiration.download-images=${INSPIRATION_DOWNLOAD_IMAGES:true}
# 爬取代理（本机无法直连 img2.ai 时开启），type 可选 SOCKS / HTTP
app.inspiration.proxy.enabled=${INSPIRATION_PROXY_ENABLED:false}
app.inspiration.proxy.type=${INSPIRATION_PROXY_TYPE:SOCKS}
app.inspiration.proxy.host=${INSPIRATION_PROXY_HOST:}
app.inspiration.proxy.port=${INSPIRATION_PROXY_PORT:0}
# 定时自动爬取（默认每天凌晨 00:00，cron 为 6 段式 秒 分 时 日 月 周）
app.inspiration.schedule.enabled=${INSPIRATION_SCHEDULE_ENABLED:true}
app.inspiration.schedule.cron=${INSPIRATION_SCHEDULE_CRON:0 0 0 * * *}
app.inspiration.schedule.zone=${INSPIRATION_SCHEDULE_ZONE:Asia/Shanghai}

# Server
server.port=8081
